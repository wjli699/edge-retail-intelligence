%YAML:1.0
# NvDCF tracker — Kalman filter + IoU association, visual features OFF.
# visualTrackerType=0 (DUMMY) means the tracker uses only bbox geometry
# (Kalman prediction + IoU matching) and never pins NVMM surfaces for pixel
# access. This eliminates "NvDecGetSurfPinHandle: Surface not registered"
# warnings caused by NvDCF's correlation filter holding surface pins past
# the NVDEC pool recycle window on Jetson.
# Visual ReID features will be re-enabled in Phase 3.

BaseConfig:
  minDetectorConfidence: 0.10    # Discard detections below this before tracking

TargetManagement:
  enableBboxUnClipping: 1
  preserveStreamUpdateOrder: 0
  maxTargetsPerStream: 50        # Retail scene: cap at 50 concurrent targets

  # New-target IOU guard — avoid spawning duplicate tracks
  minIouDiff4NewTarget: 0.7418
  minTrackerConfidence: 0.40
  probationAge: 2                # Frames before a tentative track becomes confirmed
  maxShadowTrackingAge: 51       # Frames to keep an occluded/lost target alive
  earlyTerminationAge: 1

TrajectoryManagement:
  useUniqueID: 0                 # 32-bit IDs; set 1 for 64-bit unique IDs

DataAssociator:
  dataAssociatorType: 0
  associationMatcherType: 1      # 1=cascaded (handles occlusions better)
  checkClassMatch: 1

  minMatchingScore4Overall: 0.4290
  minMatchingScore4SizeSimilarity: 0.3627
  minMatchingScore4Iou: 0.2575
  minMatchingScore4VisualSimilarity: 0.0    # unused — visual tracker is OFF

  matchingScoreWeight4VisualSimilarity: 0.0  # weight zeroed; size + IoU only
  matchingScoreWeight4SizeSimilarity: 0.6
  matchingScoreWeight4Iou: 0.4

  tentativeDetectorConfidence: 0.2008
  minMatchingScore4TentativeIou: 0.5296

StateEstimator:
  stateEstimatorType: 1          # 1=simple Kalman filter

  processNoiseVar4Loc: 1.5110
  processNoiseVar4Size: 1.3159
  processNoiseVar4Vel: 0.0300
  measurementNoiseVar4Detector: 3.0283
  measurementNoiseVar4Tracker: 8.1505

VisualTracker:
  visualTrackerType: 0           # DUMMY — no pixel access, no NVMM surface pinning
                                 # Re-enable (set to 1) in Phase 3 when ReID is added
